name: Pure Firmware Download

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  download:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # 받고 싶은 펌웨어 타겟을 배열로 지정 (여러 개 지정하면 병렬로 다운로드함)
        target: [
          "SM-L300/KOO/RFAX60RJHSL"
        ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # 디스크 용량 확보 (펌웨어 용량이 크므로 필수)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      # Python 및 순수 samloader 환경 수동 구축
      - name: Set up Python & samloader
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install samloader pycryptodome requests

      # 단독 펌웨어 다운로드 실행
      - name: Download Stock Firmware
        env:
          TARGET_INPUT: ${{ matrix.target }}
        run: |
          source venv/bin/activate
          
          # 경로 변수 강제 지정
          export ODIN_DIR="odin"
          export OUT_DIR="out"
          mkdir -p "$ODIN_DIR" "$OUT_DIR"
          
          chmod +x ./scripts/download_fw.sh
          ./scripts/download_fw.sh "$TARGET_INPUT"

      # GoFile 업로드
      - name: Upload to GoFile
        run: |
          ZIP_FILE=$(find odin -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "[!] Zip file not found!"
            exit 1
          fi

          echo "Found zip file: $ZIP_FILE"

          RESPONSE=$(curl -s -F "file=@$ZIP_FILE" -F "token=${{ secrets.GOFILE_TOKEN }}" -F "folderId=${{ secrets.GOFILE_FOLDER_ID }}" "https://upload-eu-par.gofile.io/uploadFile")

          echo "Uploaded successfully! Download link:"
          echo "$RESPONSE" | jq -r '.data.downloadPage'

          echo "MD5:"
          md5sum "$ZIP_FILE"

          echo "SHA256:"
          sha256sum "$ZIP_FILE"
