name: Download

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # 다운로드할 펌웨어 정보를 여기에 정확히 적어줍니다.
        target: [
          "SM-L300/KOO/RFAX60RJHSL"
        ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      # 용량 확보 단계 (기존 유지)
      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

            # Python 및 samloader 의존성 수동 구축
      - name: Set up Python & Dependencies
        run: |
          python3 -m venv tools/venv
          source tools/venv/bin/activate
          pip install --upgrade pip
          
          # 공식 samloader 및 암호화에 필요한 의존성 설치
          pip install samloader pycryptodome requests
          
          # 만약 레포지토리 내부에 samloader 소스가 포함되어 있는 형태라면 
          # 아래 주석을 풀고 해당 폴더로 이동해 설치해야 할 수도 있음
          # pip install .

      # 펌웨어 다운로드 수행
      - name: Download stock firmwares
        run: |
          chmod +x ./scripts/download_fw.sh
          ./scripts/download_fw.sh "${{ matrix.target }}"

      # GoFile 업로드
      - name: Upload to GoFile
        run: |
          ZIP_FILE=$(find odin -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "[!] Zip file not found!"
            exit 1
          fi

          echo "Found zip file: $ZIP_FILE"

          RESPONSE=$(curl -s -F "file=@$ZIP_FILE" -F "token=${{ secrets.GOFILE_TOKEN }}" -F "folderId=${{ secrets.GOFILE_FOLDER_ID }}" "https://upload-eu-par.gofile.io/uploadFile")

          echo "Uploaded successfully! Download link:"
          echo "$RESPONSE" | jq -r '.data.downloadPage'

          echo "MD5:"
          md5sum "$ZIP_FILE"

          echo "SHA256:"
          sha256sum "$ZIP_FILE"
