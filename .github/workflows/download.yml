name: Download Firmware (UN1CA Env)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # UN1CA 환경 구동을 위한 기기 타겟 정의 (기본 환경 세팅용)
        target: [dm1q]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      # 용량 확보 (기존 UN1CA 로직 유지)
      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      # UN1CA 빌드 환경 구축 (이 단계에서 패키지 및 samloader venv가 알아서 생성됨)
      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            7zip attr ccache clang ffmpeg \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # UN1CA 툴 체인 빌드 (samloader 등 가상환경 구동에 필수적인 기본 단계)
      - name: Build dependencies
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          ./scripts/build_dependencies.sh

      # 펌웨어 다운로드 실행 (원하는 펌웨어 형식을 인자로 주입)
      - name: Download stock firmwares
        run: |
          source ./buildenv.sh ${{ matrix.target }}
          chmod +x ./scripts/download_fw.sh
          ./scripts/download_fw.sh "SM-L300/KOO/RFAX60RJHSL"

      # 고파일 업로드 (UN1CA의 $ODIN_DIR 구조 반영하여 out 내부 전체 서치)
      - name: Upload to GoFile
        run: |
          # UN1CA의 구조상 odin/ 폴더 내부 세부 경로에 저장됨
          ZIP_FILE=$(find odin -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "[!] Zip file not found!"
            exit 1
          fi

          echo "Found zip file: $ZIP_FILE"

          RESPONSE=$(curl -s -F "file=@$ZIP_FILE" -F "token=${{ secrets.GOFILE_TOKEN }}" -F "folderId=${{ secrets.GOFILE_FOLDER_ID }}" "https://upload-eu-par.gofile.io/uploadFile")

          echo "Uploaded successfully! Download link:"
          echo "$RESPONSE" | jq -r '.data.downloadPage'

          echo "MD5:"
          md5sum "$ZIP_FILE"

          echo "SHA256:"
          sha256sum "$ZIP_FILE"
