name: Pure Firmware Download (samloader-rs)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  download:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        target: [
          "SM-L300"
        ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # 디스크 용량 확보
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      # Rust 버전의 samloader-rs 클론 및 빌드
      - name: Build samloader-rs
        run: |
          git clone https://github.com/topjohnwu/samloader-rs.git tools/samloader-rs
          cd tools/samloader-rs
          cargo build --release
          
          # 빌드된 바이너리를 시스템 전역 경로로 이동시켜서 'samloader' 명령어로 바로 쓸 수 있게 함
          sudo cp target/release/samloader /usr/local/bin/samloader
          cd ../..

      # 펌웨어 다운로드 실행
      - name: Download Stock Firmware
        env:
          TARGET_INPUT: ${{ matrix.target }}
        run: |
          export ODIN_DIR="odin"
          export OUT_DIR="out"
          mkdir -p "$ODIN_DIR" "$OUT_DIR"
          
          chmod +x ./scripts/download_fw.sh
          ./scripts/download_fw.sh "$TARGET_INPUT"

      # GoFile 업로드
      - name: Upload to GoFile
        run: |
          ZIP_FILE=$(find odin -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "[!] Zip file not found!"
            exit 1
          fi

          echo "Found zip file: $ZIP_FILE"

          RESPONSE=$(curl -s -F "file=@$ZIP_FILE" -F "token=${{ secrets.GOFILE_TOKEN }}" -F "folderId=${{ secrets.GOFILE_FOLDER_ID }}" "https://upload-eu-par.gofile.io/uploadFile")

          echo "Uploaded successfully! Download link:"
          echo "$RESPONSE" | jq -r '.data.downloadPage'

          echo "MD5:"
          md5sum "$ZIP_FILE"

          echo "SHA256:"
          sha256sum "$ZIP_FILE"
